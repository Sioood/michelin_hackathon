  '@types/passport-jwt': ^4.0.1
  '@typescript-eslint/parser': ^8.59.4
  '@vite-pwa/nuxt': ^1.1.1
  '@vitest/browser': ^4.1.9
  '@vitest/browser-playwright': ^4.1.9
