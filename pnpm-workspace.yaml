  vue-eslint-parser: ^10.4.0
  'vue-router': ^5.0.7
  'yaml': ^2.9.0
  zod: ^4.4.3

minimumReleaseAge: 1440 # 24 hours
minimumReleaseAgeExclude:
  - esbuild@0.28.1
  - nuxt@4.4.7
  - multer@2.2.0

packageExtensions:
  '@unhead/bundler@3.1.0':
    dependencies:
      unhead: ^3.1.0
    peerDependenciesMeta:
      unhead:
        optional: true

