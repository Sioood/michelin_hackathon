packages:
  - 'apps/*'
  - 'packages/*'
  - 'packages/config/*'

allowBuilds:
  '@parcel/watcher': true
  bcrypt: true
  esbuild: true
  maplibre-gl: true
  sharp: true
  unrs-resolver: true
  vue-demi: true

