  '@vueuse/core': ^14.3.0
  '@vueuse/nuxt': ^14.3.0
  bcrypt: ^6.0.0
  class-variance-authority: ^0.7.1
  class-transformer: ^0.5.1
  class-validator: ^0.14.4
  commander: ^13.1.0
  fuse.js: ^7.4.2
  eslint: ^10.4.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-vue: ^10.9.1
  nuxt: ^4.4.8
