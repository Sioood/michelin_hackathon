services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - pnpm-store:/pnpm/store
    environment:
      DOCKER: '1'
      CHOKIDAR_USEPOLLING: 'true'
      NUXT_PUBLIC_SITE_URL: http://localhost:3000
    env_file:
      - path: apps/web/.env
        required: false
    command: ['pnpm', '--filter', '@michelin_hackaton/web', 'dev', '--host', '0.0.0.0', '--port', '3000']

volumes:
  web_node_modules: {}
  pnpm-store: {}
