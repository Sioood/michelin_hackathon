services:
  database:
    image: postgres:17-alpine
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-michelin_hackathon}
      POSTGRES_USER: ${POSTGRES_USER:-michelin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-michelin}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - pnpm-store:/pnpm/store
    environment:
      DOCKER: '1'
      CHOKIDAR_USEPOLLING: 'true'
      NUXT_PUBLIC_SITE_URL: http://localhost:3000
    env_file:
      - path: apps/web/.env
        required: false
    command:
      ['pnpm', '--filter', '@michelin_hackaton/web', 'dev', '--host', '0.0.0.0', '--port', '3000']

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    ports:
      - '${API_PORT:-3001}:3000'
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - pnpm-store:/pnpm/store
    environment:
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-michelin_hackathon}
      DB_USER: ${POSTGRES_USER:-michelin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-michelin}
      CORS_ORIGIN: http://localhost:3000
    env_file:
      - path: apps/api/.env
        required: false
    depends_on:
      database:
        condition: service_healthy
    command: ['pnpm', '--filter', '@michelin_hackaton/api', 'start:dev']

volumes:
  postgres_data: {}
  web_node_modules: {}
  api_node_modules: {}
  pnpm-store: {}
